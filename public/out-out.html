<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Afmelden Nieuwsbrief</title>
   <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOaLAA0Y5uU6sHhXw2L/9Q+gHjF4x5qA+5fF5+T9X0lE8z2+x2+Q+Gz5uL6F5F5t5t5t" crossorigin="anonymous">

    <style>
        /* Aangepaste CSS voor de achtergrond, lettertype en leesbaarheid */
        body.background-image {
            /* BELANGRIJK: Pas het pad aan indien nodig. */
            background-image: url('Rustige achtergrond.png'); 
            background-size: cover; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter Tight', sans-serif; /* Lettertype Inter Tight */
            color: #333;
        }

        /* Styling van de kaart/container */
        .unsubscribe-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 40px; /* Padding 40px zoals gevraagd */
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.15);
            max-width: 550px; /* Compacte breedte */
            width: 100%;
        }
        /* Nieuwe stijl voor het logo */
        .logo-image {
            max-width: 180px; /* Aanbevolen breedte, u kunt dit aanpassen */
            height: auto;
            margin-bottom: 24px; /* 3x8 afstand boven de h1 */
            display: block; 
        }

        /* Titels en koppen (Inter Tight 700 voor de titel) */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #212529;
            margin-bottom: -12px; 
            text-align: left;
        }
        
        /* Algemene teksten */
        .card-text {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 32px; /* 3x8 afstand */
            text-align: left;
        }
        .card-text strong {
            font-weight: 600; /* Medium dik voor het e-mailadres */
            display: block;
            margin-bottom: 24px;
        }

        /* Label/Titel voor invoerveld */
        .input-label {
            font-weight: 400; 
            display: block;
            margin-bottom: 8px; /* 8px afstand tussen label en invoerveld (Regel van 8) */
            font-size: 1rem;
            text-align: left;
        }

        /* Invoervelden */
        .form-control {
            border-radius: 5px;
            padding: 16px; /* 2x8 padding */
            font-size: 1rem;
            height: auto;
            border: 1px solid #ced4da;
            margin-bottom: 24px; /* 3x8 afstand tussen velden */
            width: 100%; /* Vult de container */
            font-family: 'Inter Tight', sans-serif;
            /* NIEUWE TOEVOEGING: Zorgt ervoor dat padding en border in de totale breedte zitten */
            box-sizing: border-box; 
        }

        /* Scheidingslijn */
        hr {
            border-top: 1px solid #fafafa;
            margin-top: 32px; /* 4x8 afstand */
            margin-bottom: 32px; /* 4x8 afstand */
        }

        /* Knop */
        .btn-unsubscribe {
            background-color: #ff6b00; /* Oranje kleur */
            border-color: #ff6b00;
            color: #ffffff;
            padding: 16px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 5px;
            width: 100%; /* Vult de hele breedte */
            margin-top: 16px; /* 3x8 afstand boven de knop */
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .btn-unsubscribe:hover {
            background-color: #e65c00; 
            border-color: #e65c00;
            color: #ffffff;
        }
        
        .text-small {
            font-size: 0.9rem;
            text-align: left;
        }
    </style>
</head>
<body class="background-image">

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
    
                    
                    <div class="unsubscribe-card mx-auto">
                        
                        <img src="https://jvemarketing.nl/wp-content/uploads/2025/07/JVE-Marketing-logo-donker-min-scaled.png" alt="JVE Marketing Logo" class="logo-image">
                        
                        <h1>Afmelden</h1>

                        <p class="card-text" style="margin-bottom: 16px;">
                            Bevestig de gegevens die u wenst af te melden.
                        </p>
                    
                    <form action="/uw-afmeld-verwerkings-url" method="POST">
                        
                        <div class="form-group mb-0">
                            <label for="emailInput" class="input-label">Voer e-mailadres in:</label>
                            <input type="email" class="form-control" id="emailInput" name="email" placeholder="your-email@email.com" aria-describedby="emailHelp">
                        </div>
                        
                        <div class="form-group mb-0">
                            <label for="mobileInput" class="input-label">Vul mobiel nummer in:</label>
                            <input type="tel" class="form-control" id="mobileInput" name="mobile" placeholder="0612345678" aria-describedby="mobileHelp">
                        </div>

                        <button type="submit" class="btn btn-unsubscribe">
                            Uitschrijven
                        </button>
                        
                    </form>

                    <hr>
                    
                    <p class="text-muted text-small">
    Heeft u vragen? Stuur een mailtje naar 
    <a href="mailto:info@jvemarketing.nl">info@jvemarketing.nl</a>
</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
